<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Progreso — Mi Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <div class="container">
    <div class="eyebrow">Historial</div>
    <h1>Progreso</h1>
  </div>
</div>

<div class="container">
  <div class="search-row">
    <select id="select-ejercicio"><option value="">Selecciona un ejercicio...</option></select>
  </div>

  <div id="resumen" style="display:none;">
    <div class="card" style="display:flex; justify-content:space-around; text-align:center;">
      <div>
        <div class="stat-num" id="stat-max">–</div>
        <div class="stat-label">Peso máx (kg)</div>
      </div>
      <div>
        <div class="stat-num" id="stat-sesiones">–</div>
        <div class="stat-label">Sesiones</div>
      </div>
      <div>
        <div class="stat-num" id="stat-ultimo">–</div>
        <div class="stat-label">Última vez</div>
      </div>
    </div>

    <div class="card">
      <div class="field-label">Peso máximo por sesión</div>
      <canvas id="chart" height="180"></canvas>
    </div>

    <div class="card">
      <div class="field-label">Historial detallado</div>
      <div id="tabla-historial"></div>
    </div>
  </div>

  <div class="empty-state" id="cargando">
    <div class="big">⏳</div>
    Cargando historial desde tu hoja...
  </div>
</div>

<nav class="tabbar">
  <a href="index.html"><span class="icon">📚</span>Biblioteca</a>
  <a href="registro.html"><span class="icon">📝</span>Registrar</a>
  <a href="progreso.html" class="active"><span class="icon">📈</span>Progreso</a>
</nav>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
let historial = []; // filas: {fecha, ejercicio, serie, reps, peso}
let porEjercicio = {};

async function iniciar() {
  const cargando = document.getElementById("cargando");
  if (!apiConfigured()) {
    cargando.innerHTML = '<div class="big">⚙️</div>Falta configurar la URL de tu Apps Script en js/config.js';
    return;
  }
  try {
    const data = await apiGet("historial");
    historial = data.filas || [];
    if (!historial.length) {
      cargando.innerHTML = '<div class="big">📭</div>Aún no hay sesiones guardadas. Ve a "Registrar" para empezar.';
      return;
    }
    agrupar();
    poblarSelect();
    cargando.style.display = "none";
  } catch (err) {
    cargando.innerHTML = '<div class="big">⚠️</div>No se pudo cargar el historial: ' + err.message;
  }
}

function agrupar() {
  porEjercicio = {};
  historial.forEach(f => {
    if (!porEjercicio[f.ejercicio]) porEjercicio[f.ejercicio] = [];
    porEjercicio[f.ejercicio].push(f);
  });
}

function poblarSelect() {
  const sel = document.getElementById("select-ejercicio");
  const nombres = Object.keys(porEjercicio).sort();
  sel.innerHTML = '<option value="">Selecciona un ejercicio...</option>' +
    nombres.map(n => `<option value="${n}">${n}</option>`).join("");
  sel.addEventListener("change", () => mostrarEjercicio(sel.value));
}

function mostrarEjercicio(nombre) {
  const resumen = document.getElementById("resumen");
  if (!nombre) { resumen.style.display = "none"; return; }
  resumen.style.display = "block";

  const filas = porEjercicio[nombre];

  // Agrupar por fecha: peso máximo de ese día
  const porFecha = {};
  filas.forEach(f => {
    const p = parseFloat(f.peso) || 0;
    if (!porFecha[f.fecha] || p > porFecha[f.fecha]) porFecha[f.fecha] = p;
  });
  const fechas = Object.keys(porFecha).sort();
  const pesos = fechas.map(f => porFecha[f]);

  document.getElementById("stat-max").textContent = Math.max(...pesos, 0);
  document.getElementById("stat-sesiones").textContent = fechas.length;
  document.getElementById("stat-ultimo").textContent = fechas.length
    ? new Date(fechas[fechas.length - 1]).toLocaleDateString("es-ES", { day: "2-digit", month: "short" })
    : "–";

  dibujarChart(fechas, pesos);

  // Tabla detallada (más reciente primero)
  const filasOrdenadas = [...filas].sort((a, b) => (a.fecha < b.fecha ? 1 : -1));
  document.getElementById("tabla-historial").innerHTML = filasOrdenadas.map(f => `
    <div class="session-ex">
      <span style="color:var(--text-dim); font-family:var(--font-mono); font-size:13px;">
        ${new Date(f.fecha).toLocaleDateString("es-ES", { day: "2-digit", month: "short" })} · serie ${f.serie}
      </span>
      <span style="font-family:var(--font-mono); font-weight:600;">${f.reps} reps × ${f.peso} kg</span>
    </div>
  `).join("");
}

function dibujarChart(labels, valores) {
  const canvas = document.getElementById("chart");
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight || 180;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  if (!valores.length) return;
  const max = Math.max(...valores) * 1.15 || 1;
  const min = 0;
  const padL = 30, padR = 10, padT = 10, padB = 24;
  const plotW = w - padL - padR, plotH = h - padT - padB;

  // ejes
  ctx.strokeStyle = "#33384555";
  ctx.beginPath();
  ctx.moveTo(padL, padT); ctx.lineTo(padL, h - padB); ctx.lineTo(w - padR, h - padB);
  ctx.stroke();

  // línea
  ctx.strokeStyle = "#c8ff3d";
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  valores.forEach((v, i) => {
    const x = padL + (plotW * (valores.length === 1 ? 0.5 : i / (valores.length - 1)));
    const y = h - padB - ((v - min) / (max - min)) * plotH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // puntos
  ctx.fillStyle = "#c8ff3d";
  valores.forEach((v, i) => {
    const x = padL + (plotW * (valores.length === 1 ? 0.5 : i / (valores.length - 1)));
    const y = h - padB - ((v - min) / (max - min)) * plotH;
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  });

  // etiquetas eje Y (min/max)
  ctx.fillStyle = "#9aa1ad";
  ctx.font = "11px monospace";
  ctx.fillText(Math.round(max), 2, padT + 10);
  ctx.fillText("0", 10, h - padB + 4);
}

iniciar();
</script>
</body>
</html>
