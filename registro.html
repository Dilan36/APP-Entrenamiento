<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Registrar — Mi Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div class="eyebrow">Hoy</div>
      <h1 id="fecha-titulo">Registrar sesión</h1>
    </div>
  </div>
</div>

<div class="container">
  <div class="search-row">
    <input type="text" id="search-add" placeholder="Agregar ejercicio a la sesión..." />
  </div>
  <div class="ex-list" id="sugerencias"></div>

  <div id="banner-hoy"></div>

  <div id="sesion-lista"></div>

  <div class="empty-state" id="sesion-vacia">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="3"/><path d="M8 12h8M12 8v8"/></svg>
    Aún no has agregado ejercicios. Búscalos arriba o desde la Biblioteca.
  </div>

  <div style="margin: 20px 0 40px;">
    <button class="btn" id="btn-guardar">Guardar sesión en mi hoja</button>
    <div style="height:8px;"></div>
    <button class="btn secondary" id="btn-limpiar">Vaciar sesión</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="tabbar">
  <a href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.2C4 4.4 4.6 3.8 5.4 3.8H11a1.6 1.6 0 0 1 1.6 1.6v14.8a1.8 1.8 0 0 0-1.8-1.8H4V5.2Z"/><path d="M20 5.2c0-.8-.6-1.4-1.4-1.4H13a1.6 1.6 0 0 0-1.6 1.6v14.8A1.8 1.8 0 0 1 13.2 18.4H20V5.2Z"/></svg>
    Biblioteca
  </a>
  <a href="rutina.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/><path d="M7.5 13.2h3M7.5 16.5h3M13.5 13.2h3"/></svg>
    Rutina
  </a>
  <a href="registro.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.2" width="14" height="16.8" rx="2.2"/><path d="M9 4.2v-.6A1.6 1.6 0 0 1 10.6 2h2.8A1.6 1.6 0 0 1 15 3.6v.6"/><path d="M12 10.5v6M9 13.5h6"/></svg>
    Registrar
  </a>
  <a href="progreso.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3.5v15.8c0 .66.54 1.2 1.2 1.2H20.5"/><path d="M7 16l3.6-4.2 3 2.6L18.5 8.4"/></svg>
    Progreso
  </a>
</nav>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/translations.js"></script>
<script>
let ALL = [];
let sesion = JSON.parse(localStorage.getItem("sesion_hoy") || "[]");

const fecha = new Date();
document.getElementById("fecha-titulo").textContent =
  "Sesión de hoy · " + fecha.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });

function normaliza(s) {
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function mostrarBannerHoy() {
  const rutina = cargarRutina();
  const hoy = rutina[diaKeyHoy()];
  const cont = document.getElementById("banner-hoy");
  if (!hoy || hoy.descanso || !hoy.ejercicios || !hoy.ejercicios.length) {
    cont.innerHTML = "";
    return;
  }
  const yaCargados = hoy.ejercicios.every(pe => sesion.find(x => x.id === pe.id));
  cont.innerHTML = `
    <div class="banner-hoy">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#10120f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/></svg>
      <div class="txt">
        <div class="eyebrow-b">Hoy toca</div>
        <div class="grupo-b">${hoy.grupo || "Entrenamiento"}</div>
      </div>
      ${yaCargados ? "" : `<button id="btn-cargar-rutina">Cargar</button>`}
    </div>
  `;
  const btn = document.getElementById("btn-cargar-rutina");
  if (btn) {
    btn.addEventListener("click", () => {
      hoy.ejercicios.forEach(pe => {
        if (sesion.find(x => x.id === pe.id)) return;
        const nSets = parseInt(pe.series) || 1;
        const sets = Array.from({ length: nSets }, () => ({ reps: "", peso: "" }));
        sesion.push({ id: pe.id, name: pe.name, repsObjetivo: pe.reps, sets });
      });
      guardarLocal();
      render();
      mostrarBannerHoy();
    });
  }
}

async function cargarDatos() {
  const res = await fetch("data/exercises_es.json");
  ALL = await res.json();
  mostrarBannerHoy();
  render();
}

// --- Buscador para agregar ejercicios sin pasar por la biblioteca ---
const searchAdd = document.getElementById("search-add");
const sugerencias = document.getElementById("sugerencias");

searchAdd.addEventListener("input", () => {
  const q = normaliza(searchAdd.value);
  if (!q) { sugerencias.innerHTML = ""; return; }
  const encontrados = ALL.filter(e => normaliza(e.name).includes(q)).slice(0, 6);
  sugerencias.innerHTML = encontrados.map(e => `
    <div class="ex-card" data-id="${e.id}">
      <img src="${e.image_url}" loading="lazy" alt="" />
      <div class="info">
        <div class="name">${e.name}</div>
        <div class="meta">${tCategoria(e.category)} · ${tEquipo(e.equipment)}</div>
      </div>
    </div>
  `).join("");
  sugerencias.querySelectorAll(".ex-card").forEach(card => {
    card.addEventListener("click", () => {
      agregarEjercicio(card.dataset.id);
      searchAdd.value = "";
      sugerencias.innerHTML = "";
    });
  });
});

function agregarEjercicio(id) {
  const e = ALL.find(x => x.id === id);
  if (!e) return;
  if (sesion.find(x => x.id === id)) return;
  sesion.push({ id: e.id, name: e.name, sets: [{ reps: "", peso: "" }] });
  guardarLocal();
  render();
}

function guardarLocal() {
  localStorage.setItem("sesion_hoy", JSON.stringify(sesion));
}

function render() {
  const cont = document.getElementById("sesion-lista");
  document.getElementById("sesion-vacia").style.display = sesion.length ? "none" : "block";

  cont.innerHTML = sesion.map((ex, exIdx) => `
    <div class="card" data-exidx="${exIdx}">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
        <h3 style="font-size:16px;">${ex.name}</h3>
        <span class="rm" data-action="quitar-ejercicio" style="color:var(--text-dim); cursor:pointer;">✕</span>
      </div>
      <div class="field-label">Series (reps × peso kg)${ex.repsObjetivo ? ` · objetivo: ${ex.repsObjetivo} reps` : ""}</div>
      <div class="sets-box">
        ${ex.sets.map((s, sIdx) => `
          <div class="set-row" data-setidx="${sIdx}">
            <div class="set-num">${sIdx + 1}</div>
            <input type="number" inputmode="numeric" placeholder="${ex.repsObjetivo || 'reps'}" value="${s.reps}" data-field="reps" />
            <input type="number" inputmode="decimal" placeholder="kg" value="${s.peso}" data-field="peso" />
            <div class="rm" data-action="quitar-serie">✕</div>
          </div>
        `).join("")}
      </div>
      <button class="btn secondary" data-action="agregar-serie" style="margin-top:6px;">+ Agregar serie</button>
    </div>
  `).join("");

  // listeners
  cont.querySelectorAll(".card").forEach(card => {
    const exIdx = Number(card.dataset.exidx);

    card.querySelector('[data-action="quitar-ejercicio"]').addEventListener("click", () => {
      sesion.splice(exIdx, 1);
      guardarLocal();
      render();
    });

    card.querySelector('[data-action="agregar-serie"]').addEventListener("click", () => {
      sesion[exIdx].sets.push({ reps: "", peso: "" });
      guardarLocal();
      render();
    });

    card.querySelectorAll(".set-row").forEach(row => {
      const sIdx = Number(row.dataset.setidx);
      row.querySelectorAll("input").forEach(inp => {
        inp.addEventListener("input", () => {
          sesion[exIdx].sets[sIdx][inp.dataset.field] = inp.value;
          guardarLocal();
        });
      });
      row.querySelector('[data-action="quitar-serie"]').addEventListener("click", () => {
        sesion[exIdx].sets.splice(sIdx, 1);
        guardarLocal();
        render();
      });
    });
  });
}

document.getElementById("btn-limpiar").addEventListener("click", () => {
  if (!confirm("¿Vaciar la sesión de hoy? Esto no borra lo ya guardado en tu hoja.")) return;
  sesion = [];
  guardarLocal();
  render();
});

document.getElementById("btn-guardar").addEventListener("click", guardarSesion);

async function guardarSesion() {
  if (!apiConfigured()) {
    alert("Falta configurar la URL de tu Apps Script en js/config.js");
    return;
  }
  if (!sesion.length) {
    alert("Agrega al menos un ejercicio antes de guardar.");
    return;
  }

  const btn = document.getElementById("btn-guardar");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  const fechaISO = new Date().toISOString().slice(0, 10);
  const filas = [];
  sesion.forEach(ex => {
    ex.sets.forEach((s, i) => {
      if (s.reps === "" && s.peso === "") return;
      filas.push({
        fecha: fechaISO,
        ejercicio: ex.name,
        serie: i + 1,
        reps: s.reps || "",
        peso: s.peso || "",
      });
    });
  });

  try {
    await apiPost("guardarSesion", { filas });
    mostrarToast("Sesión guardada ✅");
    sesion = [];
    guardarLocal();
    render();
  } catch (err) {
    alert("No se pudo guardar: " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar sesión en mi hoja";
  }
}

function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

cargarDatos();
</script>
</body>
</html>
