<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Biblioteca — Mi Entrenamiento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <div class="container">
    <div class="eyebrow">Biblioteca</div>
    <h1>Ejercicios</h1>
  </div>
</div>

<div class="container">
  <div class="search-row">
    <input type="text" id="search" placeholder="Buscar ejercicio..." />
  </div>
  <div class="chip-row" id="chips-categoria"></div>
  <div class="chip-row" id="chips-equipo" style="margin-top:8px;"></div>

  <div class="ex-list" id="ex-list"></div>
  <div class="empty-state" id="empty" style="display:none;">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.8-4.8"/></svg>
    Sin resultados. Prueba con otro filtro o búsqueda.
  </div>
</div>

<div class="sheet-backdrop" id="backdrop"></div>
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <img class="hero-gif" id="sheet-gif" src="" alt="" />
  <h2 id="sheet-name"></h2>
  <div class="tag-row" id="sheet-tags"></div>
  <div class="field-label">Instrucciones</div>
  <ol id="sheet-steps"></ol>
  <div style="margin-top:18px;">
    <button class="btn" id="btn-add-session">Agregar a la sesión de hoy</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="tabbar">
  <a href="index.html" class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5.2C4 4.4 4.6 3.8 5.4 3.8H11a1.6 1.6 0 0 1 1.6 1.6v14.8a1.8 1.8 0 0 0-1.8-1.8H4V5.2Z"/><path d="M20 5.2c0-.8-.6-1.4-1.4-1.4H13a1.6 1.6 0 0 0-1.6 1.6v14.8A1.8 1.8 0 0 1 13.2 18.4H20V5.2Z"/></svg>
    Biblioteca
  </a>
  <a href="rutina.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15" rx="2.3"/><path d="M3.5 9.5h17"/><path d="M8 3v3.2M16 3v3.2"/><path d="M7.5 13.2h3M7.5 16.5h3M13.5 13.2h3"/></svg>
    Rutina
  </a>
  <a href="registro.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.2" width="14" height="16.8" rx="2.2"/><path d="M9 4.2v-.6A1.6 1.6 0 0 1 10.6 2h2.8A1.6 1.6 0 0 1 15 3.6v.6"/><path d="M12 10.5v6M9 13.5h6"/></svg>
    Registrar
  </a>
  <a href="progreso.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3.5v15.8c0 .66.54 1.2 1.2 1.2H20.5"/><path d="M7 16l3.6-4.2 3 2.6L18.5 8.4"/></svg>
    Progreso
  </a>
</nav>

<script src="js/config.js"></script>
<script src="js/translations.js"></script>
<script>
let ALL = [];
let filtroCategoria = "todas";
let filtroEquipo = "todos";

const listEl = document.getElementById("ex-list");
const emptyEl = document.getElementById("empty");
const searchEl = document.getElementById("search");

function normaliza(s) {
  return (s || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

async function cargar() {
  const res = await fetch("data/exercises_es.json");
  ALL = await res.json();
  construirChips();
  render();
}

function construirChips() {
  const categorias = ["todas", ...new Set(ALL.map(e => e.category).filter(Boolean))].sort();
  const equipos = ["todos", ...new Set(ALL.map(e => e.equipment).filter(Boolean))].sort();

  const catBox = document.getElementById("chips-categoria");
  catBox.innerHTML = categorias.map(c =>
    `<div class="chip ${c === filtroCategoria ? "active" : ""}" data-cat="${c}">${c === "todas" ? "Todas" : tCategoria(c)}</div>`
  ).join("");
  catBox.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      filtroCategoria = chip.dataset.cat;
      construirChips();
      render();
    });
  });

  const eqBox = document.getElementById("chips-equipo");
  eqBox.innerHTML = equipos.map(eq =>
    `<div class="chip ${eq === filtroEquipo ? "active" : ""}" data-eq="${eq}">${eq === "todos" ? "Todos" : tEquipo(eq)}</div>`
  ).join("");
  eqBox.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      filtroEquipo = chip.dataset.eq;
      construirChips();
      render();
    });
  });
}

function render() {
  const q = normaliza(searchEl.value);
  const filtrados = ALL.filter(e => {
    if (filtroCategoria !== "todas" && e.category !== filtroCategoria) return false;
    if (filtroEquipo !== "todos" && e.equipment !== filtroEquipo) return false;
    if (q && !normaliza(e.name).includes(q) && !normaliza(e.target).includes(q)) return false;
    return true;
  }).slice(0, 120); // limitar render inicial por rendimiento en celular

  listEl.innerHTML = filtrados.map(e => `
    <div class="ex-card" data-id="${e.id}">
      <img src="${e.image_url}" loading="lazy" alt="" />
      <div class="info">
        <div class="name">${e.name}</div>
        <div class="meta">${tCategoria(e.category)} · ${tEquipo(e.equipment)}</div>
      </div>
    </div>
  `).join("");

  emptyEl.style.display = filtrados.length === 0 ? "block" : "none";

  listEl.querySelectorAll(".ex-card").forEach(card => {
    card.addEventListener("click", () => abrirDetalle(card.dataset.id));
  });
}

searchEl.addEventListener("input", render);

// --- Detalle (sheet) ---
const backdrop = document.getElementById("backdrop");
const sheet = document.getElementById("sheet");
let ejercicioActual = null;

function abrirDetalle(id) {
  const e = ALL.find(x => x.id === id);
  if (!e) return;
  ejercicioActual = e;
  document.getElementById("sheet-gif").src = e.gif_url;
  document.getElementById("sheet-name").textContent = e.name;
  document.getElementById("sheet-tags").innerHTML = [tCategoria(e.category), tEquipo(e.equipment), tCategoria(e.target)]
    .filter(Boolean).map(t => `<span class="tag">${t}</span>`).join("");
  const pasos = e.instrucciones && e.instrucciones.length
    ? e.instrucciones
    : ["Instrucciones no disponibles en español para este ejercicio."];
  document.getElementById("sheet-steps").innerHTML = pasos.map(p => `<li>${p}</li>`).join("");
  backdrop.classList.add("open");
  sheet.classList.add("open");
}

function cerrarDetalle() {
  backdrop.classList.remove("open");
  sheet.classList.remove("open");
}
backdrop.addEventListener("click", cerrarDetalle);

document.getElementById("btn-add-session").addEventListener("click", () => {
  if (!ejercicioActual) return;
  const sesion = JSON.parse(localStorage.getItem("sesion_hoy") || "[]");
  if (!sesion.find(x => x.id === ejercicioActual.id)) {
    sesion.push({ id: ejercicioActual.id, name: ejercicioActual.name });
    localStorage.setItem("sesion_hoy", JSON.stringify(sesion));
  }
  mostrarToast("Agregado a la sesión de hoy");
  cerrarDetalle();
});

function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

cargar();
</script>
</body>
</html>
